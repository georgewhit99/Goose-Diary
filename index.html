<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>12-Week Lean & Strong Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#121316;
    --surface:#1B1D22;
    --surface-2:#23262D;
    --line: rgba(236,234,228,0.08);
    --text:#ECEAE4;
    --muted:#8B8E96;
    --accent:#E4572E;
    --accent-dim: rgba(228,87,46,0.16);
    --amber:#F2C14E;
    --good:#6FCF97;
    --rest:#3A3D45;
    --radius: 14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.02em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  #app{max-width:560px; margin:0 auto; min-height:100vh; padding-bottom:96px; position:relative;}

  /* Hero */
  .hero{
    padding:28px 20px 22px;
    background:
      radial-gradient(120% 140% at 15% -10%, rgba(228,87,46,0.18), transparent 55%),
      var(--bg);
    border-bottom:1px solid var(--line);
  }
  .hero-eyebrow{color:var(--accent); font-size:12px; font-weight:600; letter-spacing:0.16em; margin-bottom:6px;}
  .hero h1{font-size:30px; line-height:1.05; margin:0 0 4px; color:var(--text);}
  .hero p{color:var(--muted); font-size:14px; margin:0; max-width:34ch;}

  /* Week rail */
  .week-rail{display:flex; gap:8px; overflow-x:auto; padding:16px 20px 4px; scrollbar-width:none;}
  .week-rail::-webkit-scrollbar{display:none;}
  .week-pill{
    flex:0 0 auto; width:52px; height:60px; border-radius:10px;
    background:var(--surface); border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; transition:all .15s ease;
  }
  .week-pill .wk-num{font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:600;}
  .week-pill .wk-label{font-size:9px; color:var(--muted); letter-spacing:0.06em; margin-top:2px;}
  .week-pill.active{background:var(--accent); border-color:var(--accent);}
  .week-pill.active .wk-label{color:rgba(18,19,22,0.7);}
  .week-pill .wk-dot{width:5px; height:5px; border-radius:50%; margin-top:4px; background:transparent;}
  .week-pill.done-week .wk-dot{background:var(--good);}

  /* Bar / plate progress — signature element */
  .bar-progress{margin:18px 20px 6px; padding:18px 16px 14px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);}
  .bar-progress .bp-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;}
  .bar-progress .bp-head span{font-size:11px; color:var(--muted); letter-spacing:0.08em;}
  .bar-progress .bp-count{font-family:'JetBrains Mono',monospace; color:var(--accent); font-size:13px; font-weight:600;}
  .barbell{display:flex; align-items:center; gap:0; height:34px;}
  .sleeve{width:14px; height:8px; background:var(--rest); border-radius:2px 0 0 2px;}
  .sleeve.right{border-radius:0 2px 2px 0;}
  .bar-track{flex:1; height:4px; background:var(--rest); position:relative;}
  .plates{flex:1; display:flex; justify-content:space-between; padding:0 2px;}
  .plate{width:30px; height:30px; border-radius:50%; background:var(--surface-2); border:3px solid var(--rest); display:flex; align-items:center; justify-content:center; transition:all .25s ease;}
  .plate.filled{background:var(--accent-dim); border-color:var(--accent);}
  .plate.filled::after{content:''; width:7px; height:7px; border-radius:50%; background:var(--accent);}

  /* Tabs */
  .tabs{display:flex; gap:6px; margin:20px 20px 4px; background:var(--surface); padding:4px; border-radius:10px; border:1px solid var(--line);}
  .tab{flex:1; text-align:center; padding:9px 0; border-radius:7px; font-size:12px; font-weight:600; letter-spacing:0.06em; color:var(--muted); cursor:pointer; transition:all .15s;}
  .tab.active{background:var(--accent); color:#14100d;}

  /* Day list */
  .day-list{padding:16px 20px 4px; display:flex; flex-direction:column; gap:10px;}
  .day-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 14px; display:flex; align-items:center; gap:14px; cursor:pointer;
    border-left:3px solid var(--rest); transition:all .15s ease;
  }
  .day-card:active{transform:scale(0.98);}
  .day-card.type-strength{border-left-color:var(--accent);}
  .day-card.type-run{border-left-color:var(--amber);}
  .day-card.type-rest{opacity:0.6;}
  .day-card.complete{border-left-color:var(--good); background:linear-gradient(135deg, rgba(111,207,151,0.10), var(--surface));}
  .day-badge{width:44px; height:44px; border-radius:10px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:20px; flex:0 0 auto;}
  .day-card.complete .day-badge{background:rgba(111,207,151,0.16);}
  .day-info{flex:1; min-width:0;}
  .day-info .d-name{font-size:11px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase;}
  .day-info .d-title{font-size:15px; font-weight:600; margin-top:1px;}
  .day-info .d-sub{font-size:12.5px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .chev{color:var(--muted); font-size:18px; flex:0 0 auto;}

  /* Metrics */
  .metrics-wrap{padding:16px 20px 4px;}
  .metric-form{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:16px;}
  .metric-form h3{font-size:13px; margin:0 0 12px; color:var(--muted); letter-spacing:0.08em;}
  .field-row{display:flex; gap:10px; margin-bottom:10px;}
  .field{flex:1; display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:10.5px; color:var(--muted); letter-spacing:0.05em;}
  .field input{
    background:var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:9px 10px;
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; width:100%;
  }
  .field input:focus{outline:none; border-color:var(--accent);}
  .btn-primary{
    width:100%; padding:11px 0; background:var(--accent); color:#14100d; border:none; border-radius:8px;
    font-weight:700; font-size:13px; letter-spacing:0.05em; cursor:pointer; text-transform:uppercase; margin-top:2px;
  }
  .btn-primary:active{transform:scale(0.98);}
  .chart-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
  .chart-card h3{font-size:12px; color:var(--muted); letter-spacing:0.08em; margin:0 0 10px;}
  .chart-card .latest{font-family:'JetBrains Mono',monospace; font-size:22px; color:var(--text); font-weight:600;}
  .chart-card .latest span{font-size:12px; color:var(--muted); font-weight:400; margin-left:4px;}
  .chart-box{height:130px; margin-top:8px;}
  .empty-note{color:var(--muted); font-size:12.5px; text-align:center; padding:20px 0;}

  /* Modal */
  .modal-backdrop{position:fixed; inset:0; background:rgba(8,8,10,0.72); backdrop-filter:blur(6px); display:flex; align-items:flex-end; z-index:50; opacity:0; pointer-events:none; transition:opacity .2s ease;}
  .modal-backdrop.open{opacity:1; pointer-events:auto;}
  .sheet{
    background:var(--surface); width:100%; max-width:560px; margin:0 auto; border-radius:20px 20px 0 0;
    padding:8px 20px 28px; max-height:82vh; overflow-y:auto; transform:translateY(16px); transition:transform .22s ease;
    border-top:1px solid var(--line);
  }
  .modal-backdrop.open .sheet{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; background:var(--rest); border-radius:2px; margin:10px auto 14px;}
  .sheet-head{margin-bottom:6px;}
  .sheet-head .s-eyebrow{font-size:11px; color:var(--accent); letter-spacing:0.1em; font-weight:600;}
  .sheet-head h2{font-size:22px; margin:2px 0 4px;}
  .sheet-head .s-note{color:var(--muted); font-size:13px; line-height:1.5; margin:0 0 16px;}
  .ex-row{display:flex; align-items:center; gap:12px; padding:12px 0; border-top:1px solid var(--line);}
  .ex-check{width:22px; height:22px; border-radius:6px; border:1.5px solid var(--rest); flex:0 0 auto; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s;}
  .ex-check.checked{background:var(--good); border-color:var(--good); color:#0e1210; font-size:13px;}
  .ex-body{flex:1;}
  .ex-name{font-size:14.5px; font-weight:500;}
  .ex-name.checked{color:var(--muted); text-decoration:line-through;}
  .ex-meta{font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-top:2px;}
  .sheet-actions{margin-top:18px; display:flex; gap:10px;}
  .btn-ghost{flex:1; padding:11px 0; background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;}
  .btn-complete{flex:2; padding:11px 0; background:var(--good); border:none; color:#0e1210; border-radius:8px; font-size:13px; font-weight:700; letter-spacing:0.04em; cursor:pointer; text-transform:uppercase;}
  .btn-complete.done{background:var(--surface-2); color:var(--good); border:1px solid var(--good);}

  /* toast */
  .toast{position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--surface-2); border:1px solid var(--line); color:var(--text); padding:10px 18px; border-radius:20px; font-size:13px; opacity:0; pointer-events:none; transition:all .25s ease; z-index:60;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* bottom nav */
  .bottom-nav{position:fixed; bottom:0; left:0; right:0; background:rgba(27,29,34,0.94); backdrop-filter:blur(14px); border-top:1px solid var(--line); padding:10px 0 calc(10px + env(safe-area-inset-bottom)); z-index:40;}
  .bn-inner{max-width:560px; margin:0 auto; display:flex; justify-content:center; gap:34px;}
  .bn-item{display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font-size:10px; letter-spacing:0.06em; cursor:pointer; font-weight:600;}
  .bn-item .bn-icon{font-size:19px;}
  .bn-item.active{color:var(--accent);}

  ::selection{background:var(--accent-dim);}
  a{color:var(--accent);}
</style>
</head>
<body>
<div id="app">

  <div class="hero">
    <div class="hero-eyebrow">12-WEEK PROGRAM · LEAN &amp; STRONG</div>
    <h1>Training Plan</h1>
    <p>Strength 4x/week, running &amp; football, built around broken sleep — consistency over heroics.</p>
  </div>

  <div class="week-rail" id="week-rail"></div>

  <div class="bar-progress">
    <div class="bp-head">
      <span>THIS WEEK'S LOAD</span>
      <span class="bp-count" id="bp-count">0 / 5</span>
    </div>
    <div class="barbell">
      <div class="sleeve"></div>
      <div class="plates" id="plates"></div>
      <div class="sleeve right"></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="plan" onclick="switchTab('plan')">Plan</div>
    <div class="tab" data-tab="metrics" onclick="switchTab('metrics')">Metrics</div>
  </div>

  <div id="plan-view" class="day-list"></div>

  <div id="metrics-view" class="metrics-wrap" style="display:none;">
    <div class="metric-form">
      <h3>LOG THIS WEEK</h3>
      <div class="field-row">
        <div class="field">
          <label>BODYWEIGHT (KG)</label>
          <input type="number" step="0.1" id="in-weight" placeholder="97.0">
        </div>
        <div class="field">
          <label>WAIST (CM)</label>
          <input type="number" step="0.1" id="in-waist" placeholder="94.0">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>MAIN LIFTS TOTAL (KG)</label>
          <input type="number" step="1" id="in-lift" placeholder="e.g. squat+row+press top sets">
        </div>
      </div>
      <button class="btn-primary" onclick="addMetricEntry()">Save entry</button>
    </div>

    <div class="chart-card">
      <h3>BODYWEIGHT</h3>
      <div id="weight-latest" class="latest">—</div>
      <div class="chart-box"><canvas id="chart-weight"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>WAIST</h3>
      <div id="waist-latest" class="latest">—</div>
      <div class="chart-box"><canvas id="chart-waist"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>STRENGTH TOTAL</h3>
      <div id="lift-latest" class="latest">—</div>
      <div class="chart-box"><canvas id="chart-lift"></canvas></div>
    </div>
  </div>

</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="if(event.target===this) closeModal()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="s-eyebrow" id="s-eyebrow">DAY</div>
      <h2 id="s-title">Workout</h2>
      <p class="s-note" id="s-note"></p>
    </div>
    <div id="ex-list"></div>
    <div class="sheet-actions">
      <button class="btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn-complete" id="complete-btn" onclick="toggleDayComplete()">Mark complete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <div class="bn-inner">
    <div class="bn-item active" data-nav="plan" onclick="switchTab('plan')"><span class="bn-icon">🏋️</span>PLAN</div>
    <div class="bn-item" data-nav="metrics" onclick="switchTab('metrics')"><span class="bn-icon">📈</span>METRICS</div>
  </div>
</nav>

<script>
/* ---------- Plan data ---------- */
const abCircuits = [
  [ {n:'Hanging leg raises', m:'3 × 10–15'}, {n:'Plank', m:'3 × 45–60s'}, {n:'DB Russian twists', m:'3 × 15/side'} ],
  [ {n:'Ab wheel rollout', m:'3 × 10–12'}, {n:'Side plank', m:'3 × 30–40s/side'}, {n:'Slow mountain climbers', m:'3 × 12/side'} ],
  [ {n:'Hanging knee raises', m:'3 × 12–15'}, {n:'Plank shoulder taps', m:'3 × 40s'}, {n:'Cable/band woodchoppers', m:'3 × 15/side'} ],
  [ {n:'Hanging leg raises', m:'3 × max'}, {n:'Plank', m:'3 × 60s'}, {n:'Weighted DB sit-ups', m:'3 × 12' } ]
];
function abCircuitFor(week){ return abCircuits[(week-1) % abCircuits.length]; }

function dayTemplates(week){
  const ab = abCircuitFor(week);
  return [
    { key:'mon', label:'MON', type:'strength', title:'Upper — Push / Pull', icon:'💪',
      note:'Pull-ups + presses + rows. Go close to failure on the last set of each move — with the DB cap at 20kg, effort is what drives progress.',
      exercises:[
        {n:'Pull-ups', m:'4 × max reps'},
        {n:'DB shoulder press', m:'4 × 10–12'},
        {n:'DB bent-over row', m:'4 × 10–12'},
        {n:'DB incline / floor press', m:'3 × 12'},
        {n:'Face pulls / band pull-aparts', m:'3 × 15'},
        ...ab
      ]},
    { key:'tue', label:'TUE', type:'strength', title:'Lower Body', icon:'🦵',
      note:'Squat pattern + hinge. Keep tempo controlled — quality reps over rushed sets.',
      exercises:[
        {n:'Barbell / goblet squat', m:'4 × 10'},
        {n:'Romanian deadlift', m:'4 × 10'},
        {n:'Walking lunges', m:'3 × 12/leg'},
        {n:'Standing calf raises', m:'3 × 15'},
        ...ab
      ]},
    { key:'wed', label:'WED', type:'run', title:'Run + Finisher', icon:'🏃',
      note:'Your scheduled run, then a short strength finisher while still warm.',
      exercises:[
        {n:'Run — as scheduled', m:'—'},
        {n:'Pull-ups', m:'3 rounds × 10'},
        {n:'DB thrusters', m:'3 rounds × 10'}
      ]},
    { key:'thu', label:'THU', type:'strength', title:'Upper — Angle 2', icon:'💪',
      note:'Same muscles, different angle — keeps joints fresh and targets arms directly.',
      exercises:[
        {n:'Single-arm DB row', m:'4 × 10/side'},
        {n:'DB / Arnold press', m:'3 × 10'},
        {n:'Pull-ups', m:'3 × max'},
        {n:'DB curls', m:'3 × 12'},
        {n:'Overhead tricep extension', m:'3 × 12'},
        ...ab
      ]},
    { key:'fri', label:'FRI', type:'run', title:'Run / Football + Core', icon:'⚽',
      note:'Run or football as scheduled. Add 10–15 min of core work if you\'re fresh enough — skip it if not, the session still counts.',
      exercises:[
        {n:'Run or football — as scheduled', m:'—'},
        ...ab
      ]},
    { key:'sat', label:'SAT', type:'rest', title:'Rest / Optional Football', icon:'🛌',
      note:'Active recovery only. A walk beats a hard session if sleep\'s been rough — listen to your body.',
      exercises:[]},
    { key:'sun', label:'SUN', type:'rest', title:'Rest', icon:'🛌',
      note:'Full rest. Recovery is part of the program, not a day off from it.',
      exercises:[]}
  ];
}

/* ---------- State ---------- */
const TOTAL_WEEKS = 12;
let state = { currentWeek:1, completedDays:{}, exerciseChecks:{}, metrics:[] };
let activeDayKey = null;
let charts = {};

async function loadState(){
  try{
    const res = await window.storage.get('plan-state-v1');
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state = Object.assign(state, parsed);
    }
  }catch(e){ /* no saved state yet */ }
}
async function saveState(){
  try{ await window.storage.set('plan-state-v1', JSON.stringify(state)); }
  catch(e){ console.error('save failed', e); }
}

function dayId(week, key){ return `${week}-${key}`; }

/* ---------- Rendering ---------- */
function renderWeekRail(){
  const rail = document.getElementById('week-rail');
  rail.innerHTML = '';
  for(let w=1; w<=TOTAL_WEEKS; w++){
    const days = dayTemplates(w).filter(d=>d.type!=='rest');
    const doneCount = days.filter(d=>state.completedDays[dayId(w,d.key)]).length;
    const pill = document.createElement('div');
    pill.className = 'week-pill' + (w===state.currentWeek?' active':'') + (doneCount===days.length?' done-week':'');
    pill.onclick = ()=>{ state.currentWeek = w; saveState(); renderAll(); };
    pill.innerHTML = `<div class="wk-num">${String(w).padStart(2,'0')}</div><div class="wk-label">WK</div><div class="wk-dot"></div>`;
    rail.appendChild(pill);
  }
  document.querySelectorAll('.week-pill.active').forEach(p=>p.scrollIntoView({inline:'center', block:'nearest'}));
}

function renderBarProgress(){
  const days = dayTemplates(state.currentWeek).filter(d=>d.type!=='rest');
  const doneCount = days.filter(d=>state.completedDays[dayId(state.currentWeek,d.key)]).length;
  document.getElementById('bp-count').textContent = `${doneCount} / ${days.length}`;
  const platesEl = document.getElementById('plates');
  platesEl.innerHTML = '';
  days.forEach((d,i)=>{
    const p = document.createElement('div');
    p.className = 'plate' + (i<doneCount ? ' filled' : '');
    platesEl.appendChild(p);
  });
}

function renderDayList(){
  const wrap = document.getElementById('plan-view');
  wrap.innerHTML = '';
  const days = dayTemplates(state.currentWeek);
  days.forEach(d=>{
    const complete = !!state.completedDays[dayId(state.currentWeek, d.key)];
    const card = document.createElement('div');
    card.className = `day-card type-${d.type}` + (complete ? ' complete' : '');
    card.onclick = ()=> openModal(d);
    const sub = d.exercises.length ? d.exercises.slice(0,3).map(e=>e.n).join(' · ') : 'Recovery day';
    card.innerHTML = `
      <div class="day-badge">${complete ? '✅' : d.icon}</div>
      <div class="day-info">
        <div class="d-name">${d.label}</div>
        <div class="d-title">${d.title}</div>
        <div class="d-sub">${sub}</div>
      </div>
      <div class="chev">›</div>`;
    wrap.appendChild(card);
  });
}

function renderAll(){
  renderWeekRail();
  renderBarProgress();
  renderDayList();
}

/* ---------- Modal ---------- */
function openModal(d){
  activeDayKey = d.key;
  document.getElementById('s-eyebrow').textContent = `WEEK ${state.currentWeek} · ${d.label}`;
  document.getElementById('s-title').textContent = d.title;
  document.getElementById('s-note').textContent = d.note;

  const list = document.getElementById('ex-list');
  list.innerHTML = '';
  const id = dayId(state.currentWeek, d.key);
  d.exercises.forEach((ex, i)=>{
    const checkId = `${id}::${i}`;
    const checked = !!state.exerciseChecks[checkId];
    const row = document.createElement('div');
    row.className = 'ex-row';
    row.innerHTML = `
      <div class="ex-check ${checked?'checked':''}" data-check="${checkId}">${checked?'✓':''}</div>
      <div class="ex-body">
        <div class="ex-name ${checked?'checked':''}">${ex.n}</div>
        <div class="ex-meta">${ex.m}</div>
      </div>`;
    row.querySelector('.ex-check').onclick = ()=> toggleExercise(checkId);
    list.appendChild(row);
  });

  const completeBtn = document.getElementById('complete-btn');
  const isComplete = !!state.completedDays[id];
  completeBtn.textContent = isComplete ? 'Completed ✓' : 'Mark complete';
  completeBtn.className = 'btn-complete' + (isComplete ? ' done' : '');
  completeBtn.style.display = d.exercises.length ? 'block' : 'none';

  document.getElementById('modal-backdrop').classList.add('open');
}
function closeModal(){
  document.getElementById('modal-backdrop').classList.remove('open');
  activeDayKey = null;
}
function toggleExercise(checkId){
  state.exerciseChecks[checkId] = !state.exerciseChecks[checkId];
  saveState();
  const d = dayTemplates(state.currentWeek).find(x=>x.key===activeDayKey);
  openModal(d);
}
function toggleDayComplete(){
  if(!activeDayKey) return;
  const id = dayId(state.currentWeek, activeDayKey);
  const wasComplete = !!state.completedDays[id];
  state.completedDays[id] = !wasComplete;
  saveState();
  const d = dayTemplates(state.currentWeek).find(x=>x.key===activeDayKey);
  openModal(d);
  renderAll();
  showToast(wasComplete ? 'Marked incomplete' : 'Session logged 💪');
}

/* ---------- Tabs ---------- */
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.bn-item').forEach(t=>t.classList.toggle('active', t.dataset.nav===tab));
  document.getElementById('plan-view').style.display = tab==='plan' ? 'flex' : 'none';
  document.getElementById('metrics-view').style.display = tab==='metrics' ? 'block' : 'none';
  document.querySelector('.week-rail').style.display = tab==='plan' ? 'flex' : 'none';
  document.querySelector('.bar-progress').style.display = tab==='plan' ? 'block' : 'none';
  if(tab==='metrics') renderMetrics();
}

/* ---------- Metrics ---------- */
async function addMetricEntry(){
  const weight = parseFloat(document.getElementById('in-weight').value);
  const waist = parseFloat(document.getElementById('in-waist').value);
  const lift = parseFloat(document.getElementById('in-lift').value);
  if(isNaN(weight) && isNaN(waist) && isNaN(lift)){
    showToast('Enter at least one value');
    return;
  }
  state.metrics.push({
    date: new Date().toISOString(),
    week: state.currentWeek,
    weight: isNaN(weight)?null:weight,
    waist: isNaN(waist)?null:waist,
    lift: isNaN(lift)?null:lift
  });
  await saveState();
  document.getElementById('in-weight').value = '';
  document.getElementById('in-waist').value = '';
  document.getElementById('in-lift').value = '';
  showToast('Entry saved');
  renderMetrics();
}

function buildChart(canvasId, points, color, unit){
  const ctx = document.getElementById(canvasId);
  if(charts[canvasId]) charts[canvasId].destroy();
  if(points.length === 0) return;
  charts[canvasId] = new Chart(ctx, {
    type:'line',
    data:{
      labels: points.map((_,i)=> `W${points[i].week}`),
      datasets:[{
        data: points.map(p=>p.value),
        borderColor: color,
        backgroundColor: color+'22',
        tension:0.35,
        fill:true,
        pointRadius:3,
        pointBackgroundColor: color,
        borderWidth:2
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:(c)=> `${c.parsed.y} ${unit}` } } },
      scales:{
        x:{ ticks:{ color:'#8B8E96', font:{size:10} }, grid:{ display:false } },
        y:{ ticks:{ color:'#8B8E96', font:{size:10} }, grid:{ color:'rgba(236,234,228,0.06)' } }
      }
    }
  });
}

function renderMetrics(){
  const weightPts = state.metrics.filter(m=>m.weight!=null).map(m=>({week:m.week, value:m.weight}));
  const waistPts = state.metrics.filter(m=>m.waist!=null).map(m=>({week:m.week, value:m.waist}));
  const liftPts = state.metrics.filter(m=>m.lift!=null).map(m=>({week:m.week, value:m.lift}));

  document.getElementById('weight-latest').innerHTML = weightPts.length ? `${weightPts[weightPts.length-1].value}<span>kg</span>` : '—';
  document.getElementById('waist-latest').innerHTML = waistPts.length ? `${waistPts[waistPts.length-1].value}<span>cm</span>` : '—';
  document.getElementById('lift-latest').innerHTML = liftPts.length ? `${liftPts[liftPts.length-1].value}<span>kg total</span>` : '—';

  buildChart('chart-weight', weightPts, '#E4572E', 'kg');
  buildChart('chart-waist', waistPts, '#F2C14E', 'cm');
  buildChart('chart-lift', liftPts, '#6FCF97', 'kg');
}

/* ---------- Toast ---------- */
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 1800);
}

/* ---------- Init ---------- */
(async function init(){
  await loadState();
  renderAll();
})();
</script>
</body>
</html>
